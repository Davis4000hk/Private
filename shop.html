<!DOCTYPE html>

  <link rel="stylesheet" href="styles.css">
  <style>
    .shop-hero {
      padding: 150px 20px 80px;
      background: #f4f1ea;
      text-align: center;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 80px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .product-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: transform 0.3s;
    }
    .product-card:hover {
      transform: scale(1.05);
    }
    .product-icon {
      font-size: 3rem;
      color: var(--primary-color);
      margin-bottom: 20px;
    }
    .product-price {
      font-weight: bold;
      font-size: 1.2rem;
      margin: 10px 0;
    }
  </style>
</head>

    <p>為您的理財之路提供專業輔助。</p>

    <div class="product-card">

      <div class="product-price">HKD 150</div>
      <a href="#" class="whatsapp-btn">立即購買</a>
    </div>
    <div class="product-card">
      <i class="fas fa-calculator product-icon"></i>
      <h3>稅務計算工具</h3>
      <p>一鍵計算個人所得稅與預期節稅額度。</p>
