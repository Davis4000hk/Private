<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聯絡 Davis</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="form.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <!-- 導航欄 -->
  <header class="aia-header">
    <nav class="aia-nav">
      <!-- Logo -->
      <img src="https://s3.ca-central-1.amazonaws.com/logojoy/logos/214831894/noBgBlack.png" alt="AIA Logo" class="nav-logo" loading="lazy">
      
      <!-- 漢堡選單按鈕 -->
      <button class="hamburger" aria-label="Toggle navigation">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>

      <!-- 導航連結 (全屏選單) -->
      <ul class="nav-list">
        <!-- 關閉按鈕 (僅手機端顯示) -->
        <li class="menu-close-btn"><i class="fas fa-times"></i></li>
        
        <li><a href="index.html">首頁</a></li>
        <li><a href="about.html">關於我們</a></li>
        <li><a href="services.html">服務範疇</a></li>
        <li><a href="courses.html">線上課程</a></li>
        <li><a href="shop.html">商店</a></li>
        <li><a href="team.html">PRIVATE 團隊</a></li>
        
        <!-- 置中 WhatsApp 按鈕 -->
        <li class="mobile-cta">
          <a href="https://wa.me/85267188956" class="whatsapp-btn">立即 WhatsApp</a>
        </li>
      </ul>
    </nav>
  </header>

  <section class="contact-form">
    <h2>聯絡 Davis</h2>
    <p>如有查詢歡迎聯絡我</p>
    <form id="query-form">
      <!-- 姓名 -->
      <div class="form-group">
        <label for="name">姓名<span class="required">*</span></label>
        <input type="text" id="name" name="name" required>
      </div>

      <!-- 電話/電郵 -->
      <div class="form-group">
        <label for="contact">電話/電郵<span class="required">*</span></label>
        <input type="text" id="contact" name="contact" required>
      </div>

      <!-- 選擇想查詢項目 -->
      <div class="form-group">
        <label for="query-type">選擇想查詢項目<span class="required">*</span></label>
        <select id="query-type" name="query-type" required>
          <option value="一般查詢">一般查詢</option>
          <option value="個人理財">個人理財</option>
          <option value="家庭財務策劃">家庭財務策劃</option>
          <option value="風險管理">風險管理</option>
          <option value="健康管理">健康管理</option>
          <option value="企業服務">企業服務</option>
          <option value="加入我們">加入我們</option>
          <option value="合作查詢">合作查詢</option>
        </select>
      </div>

      <!-- 留言 -->
      <div class="form-group">
        <label for="message">留言</label>
        <textarea id="message" name="message" rows="4"></textarea>
      </div>

      <!-- 您是怎麼聽說我們的？ -->
      <div class="form-group">
        <label for="source">您是怎麼聽說我們的？</label>
        <select id="source" name="source">
          <option value="朋友推薦">朋友推薦</option>
          <option value="社交媒體">社交媒體</option>
          <option value="網站搜尋">網站搜尋</option>
          <option value="其他">其他</option>
        </select>
      </div>

      <!-- 提交按鈕 -->
      <button type="submit" class="submit-btn">提交查詢</button>
    </form>
  </section>

  <!-- JavaScript -->
  <script>
  document.getElementById('query-form').addEventListener('submit', function (e) {
    e.preventDefault();

    const formData = {
      name: document.getElementById('name').value,
      contact: document.getElementById('contact').value,
      queryType: document.getElementById('query-type').value,
      message: document.getElementById('message').value,
      source: document.getElementById('source').value,
    };

    fetch('https://script.google.com/macros/s/AKfycbwVFZT56kkY0D-wrzwd078O_fWGZdGx8JiG8kwRgIVu8mRXByQoqujYLBLBOCl8Y7qdHg/exec', {
      method: 'POST',
      body: JSON.stringify(formData),
    })
      .then(response => response.text())
      .then(() => {
        alert('查詢已提交，我們會盡快與您聯絡！');
        document.getElementById('query-form').reset();
      })
      .catch(() => {
        alert('提交失敗，請稍後再試。');
      });
  });
</script>
  <script src="js/script.js" defer></script>
</body>
</html>
